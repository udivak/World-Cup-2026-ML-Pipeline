db_schema: wc2026

# Squad assembly (2026 WC rules): 26-man squad = best XI (11) + 15 substitutes.
# Best XI fills the formation below (by player overall within each unit); the rest are depth.
squad:
  size: 26
  starting_xi: 11
  substitutes: 15
  formation:        # must sum to starting_xi
    gk: 1
    def: 4
    mid: 3
    att: 3

# Player-attribute sources (free; cached under raw_data_dir). Ingest wide, select narrow.
player_data:
  fifa:
    seasons: [2010, 2026]   # inclusive range of editions to ingest (FIFA 10 → FC26 where available)
    raw_subdir: fifa
  fm:
    raw_subdir: fm
  caps:
    raw_subdir: caps

# Real squad lists to ingest (Phase 2). Each maps a tournament edition to its Wikipedia
# "<event> squads" article and its start date. start_date drives nearest-PRIOR FIFA edition
# selection (no leakage). edition_year is the tournament's branding year (Euro 2020 was
# played in 2021 — start_date reflects the real date, edition_year the brand).
rosters:
  raw_subdir: rosters
  # `tournament` matches the wc2026.matches label names (martj42) so Phase 3 can join;
  # `wiki_page` is the actual Wikipedia "<event> squads" article. edition_year is the
  # branding year; start_date is the real play date (e.g. AFCON 2021 was played Jan 2022),
  # which drives nearest-prior FIFA-edition selection. Continental cups are included from
  # 2019 on (where they overlap the FIFA 2018+ editions); pre-2018 editions are omitted
  # because no FIFA edition predates them. Sources that 404 / don't parse are skipped.
  sources:
    # ---- FIFA World Cup ----
    - tournament: "FIFA World Cup"
      edition_year: 2018
      start_date: "2018-06-14"
      wiki_page: "2018 FIFA World Cup squads"
    - tournament: "FIFA World Cup"
      edition_year: 2022
      start_date: "2022-11-20"
      wiki_page: "2022 FIFA World Cup squads"
    - tournament: "FIFA World Cup"
      edition_year: 2026
      start_date: "2026-06-11"
      wiki_page: "2026 FIFA World Cup squads"
    # ---- UEFA Euro (Europe) ----
    - tournament: "UEFA Euro"
      edition_year: 2020
      start_date: "2021-06-11"
      wiki_page: "UEFA Euro 2020 squads"
    - tournament: "UEFA Euro"
      edition_year: 2024
      start_date: "2024-06-14"
      wiki_page: "UEFA Euro 2024 squads"
    # ---- Copa América (South America, CONMEBOL) ----
    - tournament: "Copa América"
      edition_year: 2019
      start_date: "2019-06-14"
      wiki_page: "2019 Copa América squads"
    - tournament: "Copa América"
      edition_year: 2021
      start_date: "2021-06-13"
      wiki_page: "2021 Copa América squads"
    - tournament: "Copa América"
      edition_year: 2024
      start_date: "2024-06-20"
      wiki_page: "2024 Copa América squads"
    # ---- African Cup of Nations (Africa, CAF) — Wikipedia: "Africa Cup of Nations" ----
    - tournament: "African Cup of Nations"
      edition_year: 2019
      start_date: "2019-06-21"
      wiki_page: "2019 Africa Cup of Nations squads"
    - tournament: "African Cup of Nations"
      edition_year: 2021
      start_date: "2022-01-09"
      wiki_page: "2021 Africa Cup of Nations squads"
    - tournament: "African Cup of Nations"
      edition_year: 2023
      start_date: "2024-01-13"
      wiki_page: "2023 Africa Cup of Nations squads"
    # ---- AFC Asian Cup (Asia, AFC) ----
    - tournament: "AFC Asian Cup"
      edition_year: 2019
      start_date: "2019-01-05"
      wiki_page: "2019 AFC Asian Cup squads"
    - tournament: "AFC Asian Cup"
      edition_year: 2023
      start_date: "2024-01-12"
      wiki_page: "2023 AFC Asian Cup squads"
    # ---- Gold Cup (North/Central America & Caribbean, CONCACAF) ----
    - tournament: "Gold Cup"
      edition_year: 2019
      start_date: "2019-06-15"
      wiki_page: "2019 CONCACAF Gold Cup squads"
    - tournament: "Gold Cup"
      edition_year: 2021
      start_date: "2021-07-10"
      wiki_page: "2021 CONCACAF Gold Cup squads"
    - tournament: "Gold Cup"
      edition_year: 2023
      start_date: "2023-06-24"
      wiki_page: "2023 CONCACAF Gold Cup squads"
    - tournament: "Gold Cup"
      edition_year: 2025
      start_date: "2025-06-14"
      wiki_page: "2025 CONCACAF Gold Cup squads"
    # ---- Oceania Nations Cup (Oceania, OFC) ----
    # No public "squads" article exists (OFC doesn't publish full squad tables on Wikipedia),
    # so this 404s and is skipped at runtime — kept as a placeholder for when one appears.
    # OFC players are also virtually absent from FIFA, so coverage would be ~0 regardless.
    - tournament: "Oceania Nations Cup"
      edition_year: 2024
      start_date: "2024-06-15"
      wiki_page: "2024 OFC Nations Cup squads"

# Tournaments that count as "major tournament" matches for the supervised label subset.
tournaments:
  - FIFA World Cup
  - UEFA Euro
  - Copa América
  - African Cup of Nations
  - AFC Asian Cup
  - Gold Cup
  - Confederations Cup
  - UEFA Nations League

# Across-edition, time-based split: train on editions on/before this date, test after. Never random.
train_cutoff_date: "2019-01-01"

# Elo is retained ONLY for the reference baseline in Phase 3 — it is not a model feature.
elo:
  k: 32
  home_advantage: 100
  mov: true          # margin-of-victory adjustment

# Product model (Phase 4 serving): blend of the bottom-up profile model with the Elo baseline.
# NOT a gate pass — Elo is never a profile feature. Weight/combiner are locked by the Phase-3
# blend backtest (src.models.evaluate) and only consumed by the live serve path (src/predict/).
#
# Backtest finding (583 matches, 14 editions): the honest NESTED across-edition blend RPS is 0.1815
# (linear) — it does NOT beat Elo's 0.1802. Profile and Elo errors are too correlated (RPS-error
# corr 0.774) for the ambiguity gain to survive out-of-sample weight selection. The pooled LOEO
# sweep dips just under Elo (0.1796 at w=0.20, beats-Elo band w∈[0.05,0.40]) but that ~1-DoF edge
# does not transfer to nested. The linear pool is served over the stacker (its 0.0003 nested-RPS
# edge is noise, below STACKER_MIN_RPS_GAIN). A modest profile share (w=0.20) is retained as a
# THESIS-motivated product choice — it adds roster-churn-robust talent signal the historical
# backtest can't reward — NOT because it is shown to beat Elo. See Docs/phase-3-blend-impl-plan.md.
blend:
  combiner: linear        # bake-off winner (stacker edge was within noise → serve the robust pool)
  weight: 0.20            # served global w* = LOEO argmin pooled RPS (profile share)
  profile_model: Ensemble # which profile candidate is pooled with Elo

rng:
  seed: 42

raw_data_dir: data/raw
